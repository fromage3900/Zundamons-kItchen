name: CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  validate-rojo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate Rojo project structure
        run: npm run validate

      - name: Lint (StyLua + Selene on Services)
        run: npm run lint

      - name: Validate git hygiene (no workspace/ or place exports)
        shell: bash
        run: |
          set -euo pipefail
          if git ls-files | grep -q '^workspace/'; then
            echo "workspace/ is committed. Remove it from git."
            exit 1
          fi
          if git ls-files | grep -E '\.(rbxlx|rbxmx)$'; then
            echo "Place/model exports should not be committed; use Rojo src/ instead."
            exit 1
          fi

      - name: Success
        run: echo "Rojo project structure looks correct."
