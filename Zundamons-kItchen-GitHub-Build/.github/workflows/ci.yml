name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate-rojo:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Zundamons-kItchen-GitHub-Build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Rokit toolchain
        run: node scripts/install-rokit-ci.mjs

      - name: Validate Rojo project + security
        run: npm run validate

      - name: Lint (StyLua + Selene)
        run: npm run lint

      - name: Success
        run: echo "Rojo project structure looks correct."
